<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fixit Mobile Repair</title>

<!-- Link CSS file -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===== HEADER ===== -->
<header>

<h2>Fixit Mobile Repair</h2>

<nav>
<a href="#home">Home</a>
<a href="#repair">Book Repair</a>
<a href="#contact">Contact</a>
</nav>

</header>


<!-- ===== NOTICE BAR ===== -->
<div class="notice">
Home Service Available Only in Nalasopara
</div>


<!-- ===== HERO SECTION ===== -->
<section class="hero" id="home">

<h1>Mobile Repair Service</h1>

<p>Professional Mobile Repair Service At Your Home</p>

<button id="bookBtn">Book Repair</button>

</section>


<!-- ===== BOOKING FORM ===== -->
<section id="repair">

<h2>Book Mobile Repair</h2>

<form id="repairForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="text" id="address" placeholder="Your Address">

<select id="brand" required>
<option value="">Select Brand</option>
<option>Apple</option>
<option>Samsung</option>
<option>Vivo</option>
<option>Oppo</option>
<option>Realme</option>
<option>Redmi</option>
<option>OnePlus</option>
<option>Other</option>
</select>

<select id="problem" required>
<option value="">Select Problem</option>
<option>Broken Screen</option>
<option>Battery Issue</option>
<option>Charging Problem</option>
<option>Speaker Problem</option>
<option>Mic Problem</option>
<option>Water Damage</option>
<option>Software Issue</option>
<option>Other</option>
</select>

<textarea id="details" placeholder="Extra Details"></textarea>

<button type="submit">Submit Request</button>

<p id="successMsg"></p>

</form>

</section>


<!-- ===== CONTACT SECTION ===== -->
<section id="contact">

<h2>Contact</h2>

<p>Quick booking on WhatsApp</p>

<div class="contact-icons">

<a href="https://wa.me/918603399409" target="_blank">
📱 WhatsApp
</a>

<a href="mailto:amitkumar8603399409@gmail.com">
📧 Email
</a>

</div>

</section>


<!-- ===== FOOTER ===== -->
<footer>

© 2026 Fixit Mobile Repair

</footer>


<!-- Link JS file -->
<script src="script.js"></script>

</body>
</html>
